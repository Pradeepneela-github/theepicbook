[frontend]
frontend-vm ansible_host=YOUR_FRONTEND_PUBLIC_IP ansible_user=azureadmin ansible_ssh_private_key_file=~/.ssh/epicbook

[backend]
backend-vm ansible_host=YOUR_BACKEND_PRIVATE_IP ansible_user=azureadmin ansible_ssh_private_key_file=~/.ssh/epicbook ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyJump=azureadmin@YOUR_FRONTEND_PUBLIC_IP'

[web:children]
frontend
backend

[web:vars]
ansible_python_interpreter=/usr/bin/python3