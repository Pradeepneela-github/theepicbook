trigger:
  branches:
    include:
      - main

# Same self-hosted agent pool as the infra pipeline.
# Your Mac already has Ansible installed so the prepare stage
# just verifies it is available rather than installing from scratch.
pool:
  name: 'epicbook-agents'

# After — all three values come from the variable group
variables:
  - group: ansible-secrets

stages:

  # ============================================================
  # STAGE 1 — Verify Ansible is ready on the self-hosted agent
  # ============================================================
  - stage: PrepareEnvironment
    displayName: 'Verify Ansible Environment'
    jobs:
      - job: Verify
        steps:
          - bash: |
              echo "Checking Ansible..."
              ansible --version

              echo "Checking PyMySQL (needed for community.mysql modules)..."
              python3 -c "import pymysql; print('PyMySQL OK:', pymysql.__version__)"

              echo "Installing community.mysql Ansible collection..."
              ansible-galaxy collection install community.mysql --force

              echo "All dependencies verified."
            displayName: 'Verify Ansible and install community.mysql collection'

  # ============================================================
  # STAGE 2 — Update inventory, then configure and deploy
  # ============================================================
  - stage: DeployEpicBook
    displayName: 'Configure Servers and Deploy App'
    dependsOn: PrepareEnvironment
    jobs:
      - job: Deploy
        steps:

          - task: DownloadSecureFile@1
            name: sshKey
            displayName: 'Download SSH private key from Azure DevOps Secure Files'
            inputs:
              secureFile: 'epicbook'

          - bash: |
              mkdir -p ~/.ssh
              cp $(sshKey.secureFilePath) ~/.ssh/epicbook
              chmod 600 ~/.ssh/epicbook

              # Add both frontend and backend to known_hosts
              ssh-keyscan -H $(APP_PUBLIC_IP) >> ~/.ssh/known_hosts

              # Add backend via ProxyJump through frontend
              ssh -i ~/.ssh/epicbook \
                -o StrictHostKeyChecking=no \
                -o ProxyCommand="ssh -i ~/.ssh/epicbook -o StrictHostKeyChecking=no -W %h:%p azureadmin@$(APP_PUBLIC_IP)" \
                azureadmin@$(BACKEND_PRIVATE_IP) "echo backend reachable" || true

              echo "SSH configuration done."
            displayName: 'Configure SSH key and known hosts'

          
          - bash: |
              echo "=== RAW VARIABLE VALUES ==="
              echo "APP_PUBLIC_IP=[$(APP_PUBLIC_IP)]"
              echo "BACKEND_PRIVATE_IP=[$(BACKEND_PRIVATE_IP)]"
              echo "MYSQL_FQDN=[$(MYSQL_FQDN)]"
              echo ""
              echo "=== INVENTORY BEFORE SED ==="
              cat $(System.DefaultWorkingDirectory)/ansible/inventory.ini
            displayName: 'DEBUG — variables and inventory before substitution'
          
          
          - bash: |
              cd $(System.DefaultWorkingDirectory)/ansible

              # macOS sed requires -i '' (empty string after -i)
              sed -i '' "s/REPLACE_WITH_FRONTEND_IP/$(APP_PUBLIC_IP)/g" inventory.ini
              sed -i '' "s/REPLACE_WITH_BACKEND_PRIVATE_IP/$(BACKEND_PRIVATE_IP)/g" inventory.ini
              sed -i '' "s/REPLACE_WITH_MYSQL_FQDN/$(MYSQL_FQDN)/g" group_vars/web.yml

              echo "Final inventory.ini:"
              cat inventory.ini
              echo ""
              echo "Final group_vars/web.yml:"
              cat group_vars/web.yml
            displayName: 'Inject Terraform outputs into Ansible inventory'

          - bash: |
              cd $(System.DefaultWorkingDirectory)/ansible

              # Quick connectivity test before running the full playbook
              ansible -i inventory.ini frontend -m ping \
                --private-key ~/.ssh/epicbook \
                --ssh-extra-args="-o StrictHostKeyChecking=no"
            displayName: 'Test SSH connectivity to frontend VM'

          - bash: |
              cd $(System.DefaultWorkingDirectory)/ansible

              ansible-playbook -i inventory.ini site.yml \
                --private-key ~/.ssh/epicbook \
                --extra-vars "db_password=$(MYSQL_ADMIN_PASSWORD) app_db_password=$(APP_DB_PASSWORD)" \
                --ssh-extra-args="-o StrictHostKeyChecking=no" \
                -v
            displayName: 'Run Ansible playbook — configure and deploy EpicBook'

  # ============================================================
  # STAGE 3 — Verify the app is live and serving HTTP 200
  # ============================================================
  - stage: VerifyDeployment
    displayName: 'Verify EpicBook is Live'
    dependsOn: DeployEpicBook
    jobs:
      - job: Verify
        steps:
          - bash: |
              echo "Waiting 30 seconds for all services to stabilize..."
              sleep 30

              echo "Sending HTTP request to http://$(APP_PUBLIC_IP) ..."
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$(APP_PUBLIC_IP))
              echo "Response status code: $HTTP_STATUS"

              if [ "$HTTP_STATUS" -eq 200 ]; then
                echo "SUCCESS: EpicBook is live at http://$(APP_PUBLIC_IP)"
              else
                echo "FAILURE: Expected HTTP 200 but got $HTTP_STATUS"
                echo "SSH into the VM and run: systemctl status epicbook"
                echo "Also check: journalctl -u epicbook -n 50"
                exit 1
              fi
            displayName: 'HTTP health check'