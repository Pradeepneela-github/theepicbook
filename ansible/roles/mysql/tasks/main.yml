---
- name: Ensure CA certificates are installed (required for SSL)
  ansible.builtin.apt:
    name: ca-certificates
    state: present
    update_cache: true

- name: Install MySQL Python dependency (required for Ansible MySQL modules)
  ansible.builtin.apt:
    name: python3-pymysql
    state: present
    update_cache: true

- name: Install MySQL client (for debugging and manual queries)
  ansible.builtin.apt:
    name: mysql-client
    state: present
    update_cache: true

- name: Wait for Azure MySQL to be reachable
  ansible.builtin.wait_for:
    host: "{{ db_host }}"
    port: 3306
    timeout: 60

- name: Test DB connection
  community.mysql.mysql_info:
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
    ssl_ca: /etc/ssl/certs/ca-certificates.crt

# NOTE: For Azure MySQL Flexible Server the login_user is just
# the admin name (e.g. mysqladmin) without the @servername suffix.
# The @servername suffix is only needed for Azure MySQL Single Server.

- name: Create database in Azure MySQL
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
    ssl_ca: /etc/ssl/certs/ca-certificates.crt
    connect_timeout: 30

- name: Create application user
  community.mysql.mysql_user:
    name: "{{ app_db_user }}"
    password: "{{ app_db_password }}"
    host: "%"
    priv: "{{ db_name }}.*:ALL"
    state: present
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
    ssl_ca: /etc/ssl/certs/ca-certificates.crt
    connect_timeout: 30

# Step 1: Verify the schema file exists before running it
- name: Check schema file exists on VM
  ansible.builtin.stat:
    path: "{{ app_dest }}/db/BuyTheBook_Schema.sql"
  register: mysql_schema_file

- name: Show schema file status
  ansible.builtin.debug:
    msg: "MySQL Schema file exists: {{ mysql_schema_file.stat.exists }}"

# Step 2: Apply schema using --force flag
# --force tells MySQL to keep going even if a table already exists
# This is needed because CREATE TABLE has no IF NOT EXISTS in this schema
# Without --force, MySQL stops at the first duplicate table error and
# never creates the remaining tables
- name: Apply database schema
  ansible.builtin.shell: |
    mysql -h {{ db_host }} \
    -u {{ db_user }} \
    -p{{ db_password }} \
    --ssl-mode=REQUIRED \
    --force \
    {{ db_name }} < {{ app_dest }}/db/BuyTheBook_Schema.sql
  when: schema_file.stat.exists
  register: mysql_schema_result
  changed_when: false
  failed_when: mysql_schema_result.rc != 0 and 'already exists' not in mysql_schema_result.stderr

# Step 3: Always show what MySQL returned so you can see it in pipeline logs
- name: Show schema apply result
  ansible.builtin.debug:
    msg: "RC: {{ mysql_schema_result.rc }} | stderr: {{ mysql_schema_result.stderr }}"
  when: mysql_schema_file.stat.exists

# Step 4: Check whether the Book table already has rows
# ignore_errors: true means if the table does not exist yet,
# the task does not crash the whole playbook — it just registers
# the failure and moves on to the set_fact step below
- name: Check if books already exist
  community.mysql.mysql_query:
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
    login_db: "{{ db_name }}"
    query: "SELECT COUNT(*) as count FROM Book;"
    ssl_ca: /etc/ssl/certs/ca-certificates.crt
  register: mysql_book_count
  ignore_errors: true

# Step 5: Decide whether seeding is needed
# If the query failed (table missing) OR the count is 0 — seed the data
# If the table already has rows — skip seeding to avoid duplicates
- name: Set seed_needed flag
  ansible.builtin.set_fact:
    mysql_seed_needed: "{{ mysql_book_count.failed or mysql_book_count.query_result[0][0].count == 0 }}"

# Step 5: Apply seed files only if the table is empty
- name: Seed authors data
  ansible.builtin.shell: |
    mysql -h {{ db_host }} \
    -u {{ db_user }} \
    -p{{ db_password }} \
    --ssl-mode=REQUIRED \
    {{ db_name }} < {{ app_dest }}/db/author_seed.sql
  when: mysql_seed_needed
  changed_when: mysql_seed_needed

- name: Seed books data
  ansible.builtin.shell: |
    mysql -h {{ db_host }} \
    -u {{ db_user }} \
    -p{{ db_password }} \
    --ssl-mode=REQUIRED \
    {{ db_name }} < {{ app_dest }}/db/books_seed.sql
  when: mysql_seed_needed
  changed_when: mysql_seed_needed
