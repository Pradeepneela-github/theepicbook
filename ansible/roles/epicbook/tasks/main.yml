---
- name: Remove existing application directory if present
  ansible.builtin.file:
    path: "{{ epicbook_app_dir }}"
    state: absent

- name: Create application directory
  ansible.builtin.file:
    path: "{{ epicbook_app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Clone EpicBook repository from Git
  ansible.builtin.git:
    repo: "{{ epicbook_app_repo }}"
    dest: "{{ epicbook_app_dir }}"
    version: "{{ epicbook_app_branch }}"
    force: true

- name: Confirm clone succeeded
  ansible.builtin.stat:
    path: "{{ epicbook_app_dir }}"
  register: epicbook_dir_check

- name: Show clone result
  ansible.builtin.debug:
    msg: "App directory exists: {{ epicbook_dir_check.stat.exists }}"

- name: Confirm db folder exists after clone
  ansible.builtin.stat:
    path: "{{ epicbook_app_dir }}/db"
  register: epicbook_db_check

- name: Show db folder result
  ansible.builtin.debug:
    msg: "db folder exists: {{ epicbook_db_check.stat.exists }}"

# Add this right after the clone task
- name: DEBUG — show full directory structure after clone
  ansible.builtin.command:
    cmd: find /opt/epicbook -maxdepth 3 -type f
  register: epicbook_cloned_files
  changed_when: false

- name: DEBUG — print all cloned files
  ansible.builtin.debug:
    msg: "{{ epicbook_cloned_files.stdout_lines }}"

- name: DEBUG — check db folder exists
  ansible.builtin.stat:
    path: "{{ epicbook_app_dir }}/db"
  register: epicbook_db_folder

- name: DEBUG — print db folder status
  ansible.builtin.debug:
    msg: "db folder exists: {{ epicbook_db_folder.stat.exists }}"

- name: Install Node.js application dependencies
  ansible.builtin.shell: |
    cd {{ epicbook_app_dir }} && npm install
  args:
    chdir: "{{ epicbook_app_dir }}"
  register: epicbook_npm_result
  changed_when: epicbook_npm_result.rc == 0

- name: Create application .env file from template
  ansible.builtin.template:
    src: env.j2
    dest: "{{ epicbook_app_dir }}/.env"
    owner: "{{ ansible_user }}"
    mode: '0600'
  notify: Restart epicbook

- name: Deploy systemd service unit file
  ansible.builtin.template:
    src: epicbook.service.j2
    dest: /etc/systemd/system/epicbook.service
    mode: '0644'
  notify: Restart epicbook

- name: Enable and start EpicBook service
  ansible.builtin.systemd:
    name: "{{ epicbook_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
