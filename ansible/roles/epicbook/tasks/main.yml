---

- name: Remove existing application directory if present
  ansible.builtin.file:
    path: "{{ epicbook_app_dir }}"
    state: absent

- name: Create application directory
  ansible.builtin.file:
    path: "{{ epicbook_app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Clone EpicBook repository from Git
  ansible.builtin.git:
    repo: "{{ epicbook_app_repo }}"
    dest: "{{ epicbook_app_dir }}"
    version: "{{ epicbook_app_branch }}"
    force: true

# -------------------------
# DEBUG (keep these, they help a LOT)
# -------------------------

- name: DEBUG — show full directory structure after clone
  ansible.builtin.command:
    cmd: find {{ epicbook_app_dir }} -maxdepth 3 -type f
  register: epicbook_cloned_files
  changed_when: false

- name: DEBUG — print all cloned files
  ansible.builtin.debug:
    msg: "{{ epicbook_cloned_files.stdout_lines }}"

# -------------------------
# Install dependencies
# -------------------------

- name: Install Node.js application dependencies
  ansible.builtin.command: npm install
  args:
    chdir: "{{ epicbook_app_dir }}"
  register: epicbook_npm_result

# -------------------------
# ENV + CONFIG
# -------------------------

- name: Create application .env file from template
  ansible.builtin.template:
    src: env.j2
    dest: "{{ epicbook_app_dir }}/.env"
    owner: "{{ ansible_user }}"
    mode: '0600'

- name: Create config directory
  ansible.builtin.file:
    path: "{{ epicbook_app_dir }}/config"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Create config.json from template
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ epicbook_app_dir }}/config/config.json"
    owner: "{{ ansible_user }}"
    mode: '0644'

# -------------------------
# SYSTEMD SERVICE
# -------------------------

- name: Deploy systemd service unit file
  ansible.builtin.template:
    src: epicbook.service.j2
    dest: /etc/systemd/system/epicbook.service
    mode: '0644'

- name: Reload systemd
  ansible.builtin.command: systemctl daemon-reload

- name: Enable and start EpicBook service
  ansible.builtin.systemd:
    name: "{{ epicbook_service_name }}"
    enabled: true
    state: restarted

# -------------------------
# 🔥 CRITICAL ADDITIONS BELOW
# -------------------------

# Wait a few seconds for app to start
- name: Wait for app to start
  ansible.builtin.pause:
    seconds: 10

# Check if port is listening
- name: Check if app is listening on port {{ epicbook_app_port }}
  ansible.builtin.shell: |
    ss -tlnp | grep :{{ epicbook_app_port }} || true
  register: port_check
  changed_when: false

- name: DEBUG — show port check
  ansible.builtin.debug:
    msg: "{{ port_check.stdout }}"

# Fail early if app is not running
- name: Fail if app is not listening
  ansible.builtin.fail:
    msg: "Application is NOT running on port {{ epicbook_app_port }}"
  when: port_check.stdout == ""

# Optional: test HTTP locally
- name: Test HTTP endpoint locally
  ansible.builtin.uri:
    url: "http://localhost:{{ epicbook_app_port }}"
    method: GET
    status_code: 200

- name: Create the application directory
  ansible.builtin.file:
    path: "{{ app_directory }}"
    state: directory
    mode: '0755'
    owner: azureuser
    group: azureuser
  become: true

- name: Clone the EpicBook application from GitHub
  ansible.builtin.git:
    repo: https://github.com/pravinmishraaws/theepicbook.git
    dest: "{{ app_directory }}"
    version: main
    force: true
  become: true
  become_user: azureuser

- name: Install Node.js dependencies from package.json
  community.general.npm:
    path: "{{ app_directory }}"
    state: present
  become: true
  become_user: azureuser

- name: Create the production environment file
  ansible.builtin.copy:
    content: |
      NODE_ENV={{ node_env }}
      PORT={{ app_port }}
      JAWSDB_URL=mysql://{{ mysql_app_user }}:{{ mysql_app_password }}@{{ mysql_fqdn }}:3306/{{ mysql_database }}
    dest: "{{ app_directory }}/.env"
    owner: azureuser
    group: azureuser
    mode: '0600'
  become: true

- name: Run database seeding tasks
  include_tasks: db_seed.yml

- name: Start the application with PM2
  ansible.builtin.shell: |
    cd {{ app_directory }}
    pm2 delete epicbook 2>/dev/null || true
    pm2 start server.js --name epicbook
    pm2 save
  become: true
  become_user: azureuser

- name: Wait for the app to start listening on port 8080
  ansible.builtin.wait_for:
    port: "{{ app_port }}"
    host: localhost
    delay: 5
    timeout: 60

