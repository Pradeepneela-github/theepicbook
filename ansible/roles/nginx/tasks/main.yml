---
- name: Install Nginx web server
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true


- name: Deploy EpicBook Nginx virtual host configuration
  ansible.builtin.template:
    src: epicbook.conf.j2
    dest: /etc/nginx/sites-available/epicbook
    mode: '0644'
  notify: Restart nginx

- name: Enable EpicBook site by creating sites-enabled symlink
  ansible.builtin.file:
    src: /etc/nginx/sites-available/epicbook
    dest: /etc/nginx/sites-enabled/epicbook
    state: link
  notify: Restart nginx

- name: Remove default Nginx site to avoid port 80 conflict
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Ensure Nginx is started and enabled on boot
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  become: true

- name: Deploy the custom Nginx configuration file
  ansible.builtin.copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Test Nginx configuration for syntax errors before starting
  ansible.builtin.command: nginx -t
  become: true

- name: Restart Nginx and enable it to start on reboot
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    enabled: true
  become: true

- name: Verify Nginx is serving a 200 response
  ansible.builtin.uri:
    url: http://localhost
    method: GET
    status_code: 200
  retries: 5
  delay: 10
  register: nginx_response
  until: nginx_response.status == 200
