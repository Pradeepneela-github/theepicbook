- name: Install Nginx web server
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  become: true

- name: Deploy the custom Nginx configuration file
  ansible.builtin.copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Test Nginx configuration for syntax errors
  ansible.builtin.command: nginx -t
  become: true

- name: Restart Nginx and enable it to start on reboot
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    enabled: true
  become: true

- name: Verify Nginx is serving a 200 response
  ansible.builtin.uri:
    url: http://localhost
    method: GET
    status_code: 200
  retries: 5
  delay: 10
  become: true
