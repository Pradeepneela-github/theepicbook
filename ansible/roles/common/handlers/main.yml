---
- name: Restart SSH
  ansible.builtin.systemd:
    name: ssh
    state: restarted
    daemon_reload: true

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    daemon_reload: true

- name: Restart epicbook
  ansible.builtin.systemd:
    name: epicbook
    state: restarted
    daemon_reload: true
