- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install required system packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - build-essential
      - mysql-client
      - python3-pip
    state: present
  become: true

- name: Install Node.js 18 using NodeSource setup script
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    apt-get install -y nodejs
  become: true
  args:
    creates: /usr/bin/node

- name: Pause to allow Node.js install to fully complete
  ansible.builtin.pause:
    seconds: 10

- name: Verify Node.js installed correctly
  ansible.builtin.command: node --version
  register: node_version_result

- name: Show the installed Node.js version
  ansible.builtin.debug:
    msg: "Node.js is ready: {{ node_version_result.stdout }}"

- name: Install PM2 process manager globally
  community.general.npm:
    name: pm2
    global: true
  become: true
